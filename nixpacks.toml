# ===========================================
# KMP HORREN - NIXPACKS CONFIGURATION
# ===========================================
# Build configuration for Railway deployment

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
# --include=dev forces npm to install devDependencies even when NODE_ENV=production
# is set (Railway sets this by default). Next.js needs the "typescript" package
# at build time to parse tsconfig.json's path aliases (@/*) - it's a devDependency,
# so a plain `npm ci` under NODE_ENV=production silently skips it, breaking @/*
# resolution for any file webpack processes without an already-cached alias map.
cmds = ["cd kmp-horren-next && npm ci --include=dev"]

[phases.build]
cmds = ["cd kmp-horren-next && NODE_OPTIONS='--max-old-space-size=4096' npm run build"]

[start]
cmd = "cd kmp-horren-next && npm run start"
