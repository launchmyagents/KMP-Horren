# ===========================================
# KMP HORREN - RAILWAY CONFIGURATION
# ===========================================

[build]
builder = "nixpacks"

[deploy]
startCommand = "cd kmp-horren-next && npm run start"
numReplicas = 1
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
