<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Background -->
  <rect width="1200" height="630" fill="#161f35"/>
  
  <!-- Decorative elements -->
  <rect x="0" y="0" width="400" height="630" fill="#1a2540"/>
  <rect x="0" y="580" width="1200" height="50" fill="#f97316"/>
  
  <!-- Logo area -->
  <rect x="60" y="60" width="280" height="80" rx="8" fill="white"/>
  <text x="200" y="115" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#161f35" text-anchor="middle">KMP HORREN</text>
  
  <!-- Main heading -->
  <text x="460" y="220" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white">Maatwerk Horren</text>
  <text x="460" y="300" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white">voor elk Raam</text>
  <text x="460" y="380" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white">en Deur</text>
  
  <!-- Tagline -->
  <text x="460" y="460" font-family="Arial, sans-serif" font-size="28" fill="#9ca3af">De specialist in maatwerk insectenwering</text>
  
  <!-- USPs -->
  <g fill="#f97316">
    <circle cx="480" cy="520" r="8"/>
    <text x="500" y="528" font-family="Arial, sans-serif" font-size="20" fill="white">Gratis verzending vanaf EUR 250</text>
  </g>
  <g fill="#f97316">
    <circle cx="780" cy="520" r="8"/>
    <text x="800" y="528" font-family="Arial, sans-serif" font-size="20" fill="white">3 jaar garantie</text>
  </g>
  <g fill="#f97316">
    <circle cx="1000" cy="520" r="8"/>
    <text x="1020" y="528" font-family="Arial, sans-serif" font-size="20" fill="white">Made in NL</text>
  </g>
</svg>
